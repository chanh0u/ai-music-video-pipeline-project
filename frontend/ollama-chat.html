<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #222230;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,106,247,0.15);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a50;
    --user-bg: #1a1830;
    --ai-bg: #111118;
    --success: #34d399;
    --error: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding: 0 4px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent2); }

  /* Model selector */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .model-select-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  .model-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    padding: 10px 36px 10px 12px;
    cursor: pointer;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }

  .model-select:focus { border-color: var(--accent); }

  .model-select-wrapper::after {
    content: '⌄';
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 14px;
  }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.error { background: var(--error); }

  /* New chat button */
  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent2);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 24px;
  }

  .new-chat-btn:hover {
    background: rgba(124,106,247,0.2);
    border-color: var(--accent);
  }

  /* Settings */
  .settings-section { flex: 1; }

  .setting-item {
    margin-bottom: 16px;
  }

  .setting-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .setting-label span { color: var(--accent2); font-family: 'DM Mono', monospace; }

  .slider {
    width: 100%;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .chat-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .model-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.2s;
  }

  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .welcome p {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    max-width: 340px;
    line-height: 1.6;
  }

  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
    margin-top: 8px;
  }

  .quick-prompt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
  }

  .quick-prompt:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-glow);
  }

  /* Message bubbles */
  .message {
    display: flex;
    gap: 14px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .avatar.user-av {
    background: linear-gradient(135deg, #3b1f8c, #5b3fd4);
    font-size: 13px;
    font-weight: 600;
    color: white;
  }

  .avatar.ai-av {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .bubble {
    max-width: 72%;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,106,247,0.2);
    border-bottom-right-radius: 4px;
  }

  .message.ai .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Code blocks inside messages */
  .bubble code {
    font-family: 'DM Mono', monospace;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 12px;
    color: var(--accent2);
  }

  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    color: #c4b5fd;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 20px 28px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.07);
  }

  #messageInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 160px;
    line-height: 1.6;
    min-height: 24px;
  }

  #messageInput::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 14px var(--accent-glow);
  }

  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
  }

  /* Error toast */
  .toast {
    position: fixed;
    top: 20px; right: 20px;
    background: #2a1010;
    border: 1px solid var(--error);
    color: var(--error);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
    z-index: 999;
    max-width: 320px;
    line-height: 1.5;
  }

  .toast.show { display: block; animation: slideUp 0.3s ease; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Local<span>AI</span></div>
  </div>

  <div class="section-label">Model</div>
  <div class="model-select-wrapper">
    <select class="model-select" id="modelSelect">
      <option value="qwen2.5:0.5b">Qwen2.5 0.5B — 400MB</option>
      <option value="llama3.2:1b">Llama 3.2 1B — 700MB</option>
      <option value="llama3.2:3b">Llama 3.2 3B — 2GB</option>
      <option value="phi3:mini">Phi-3 Mini 3.8B — 2.5GB</option>
      <option value="gemma2:2b">Gemma 2 2B — 1.5GB</option>
      <option value="mistral:7b">Mistral 7B — 4.5GB</option>
      <option value="qwen2.5:7b">Qwen2.5 7B — 5GB</option>
      <option value="llama3.1:8b">Llama 3.1 8B — 5GB</option>
      <option value="deepseek-r1:7b">DeepSeek-R1 7B — 5GB</option>
    </select>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ollama 연결 확인 중...</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <span>＋</span> 새 대화
  </button>

  <div class="settings-section">
    <div class="section-label">Parameters</div>

    <div class="setting-item">
      <div class="setting-label">Temperature <span id="tempVal">0.7</span></div>
      <input type="range" class="slider" id="tempSlider" min="0" max="2" step="0.1" value="0.7"
        oninput="document.getElementById('tempVal').textContent = this.value">
    </div>

    <div class="setting-item">
      <div class="setting-label">Max Tokens <span id="tokenVal">1024</span></div>
      <input type="range" class="slider" id="tokenSlider" min="256" max="4096" step="256" value="1024"
        oninput="document.getElementById('tokenVal').textContent = this.value">
    </div>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <header class="chat-header">
    <span class="chat-title">Conversation</span>
    <div class="model-badge" id="headerBadge">⚡ qwen2.5:0.5b</div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Local AI Chat</h2>
      <p>Ollama로 구동되는 로컬 AI입니다.<br>인터넷 없이 완전히 내 컴퓨터에서 실행돼요.</p>
      <div class="quick-prompts">
        <button class="quick-prompt" onclick="sendQuick('안녕하세요! 자기소개 해줘')">👋 자기소개</button>
        <button class="quick-prompt" onclick="sendQuick('파이썬으로 피보나치 수열 짜줘')">🐍 Python 코드</button>
        <button class="quick-prompt" onclick="sendQuick('오늘 점심 메뉴 추천해줘')">🍜 점심 추천</button>
        <button class="quick-prompt" onclick="sendQuick('AI의 미래에 대해 알려줘')">🚀 AI 이야기</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="messageInput"
        placeholder="메시지를 입력하세요... (Shift+Enter 줄바꿈)"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter로 전송 · Shift+Enter 줄바꿈</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const OLLAMA_BASE = 'http://localhost:11434';
  let messages = [];
  let isStreaming = false;

  // Check Ollama connection
  async function checkOllama() {
    try {
      const res = await fetch(`${OLLAMA_BASE}/api/tags`, { signal: AbortSignal.timeout(3000) });
      if (res.ok) {
        const data = await res.json();
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = `연결됨 (${data.models?.length || 0}개 모델)`;
        updateModelList(data.models || []);
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('statusText').textContent = 'Ollama 미연결';
    }
  }

  function updateModelList(models) {
    if (models.length === 0) return;
    const sel = document.getElementById('modelSelect');
    // Keep default list but mark installed ones
    const installedNames = models.map(m => m.name);
    Array.from(sel.options).forEach(opt => {
      if (installedNames.some(n => n.startsWith(opt.value) || opt.value.startsWith(n))) {
        opt.text += ' ✓';
      }
    });
  }

  // Update header badge on model change
  document.getElementById('modelSelect').addEventListener('change', function() {
    document.getElementById('headerBadge').textContent = '⚡ ' + this.value;
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    document.getElementById('messageInput').value = text;
    sendMessage();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 5000);
  }

  function newChat() {
    messages = [];
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Local AI Chat</h2>
        <p>Ollama로 구동되는 로컬 AI입니다.<br>인터넷 없이 완전히 내 컴퓨터에서 실행돼요.</p>
        <div class="quick-prompts">
          <button class="quick-prompt" onclick="sendQuick('안녕하세요! 자기소개 해줘')">👋 자기소개</button>
          <button class="quick-prompt" onclick="sendQuick('파이썬으로 피보나치 수열 짜줘')">🐍 Python 코드</button>
          <button class="quick-prompt" onclick="sendQuick('오늘 점심 메뉴 추천해줘')">🍜 점심 추천</button>
          <button class="quick-prompt" onclick="sendQuick('AI의 미래에 대해 알려줘')">🚀 AI 이야기</button>
        </div>
      </div>`;
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('messages');

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user-av' : 'ai-av'}`;
    avatar.textContent = role === 'user' ? 'ME' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;

    return bubble;
  }

  function addTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typingMsg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai-av';
    avatar.textContent = '🤖';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(avatar);
    div.appendChild(typing);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isStreaming) return;

    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    const model = document.getElementById('modelSelect').value;
    const temperature = parseFloat(document.getElementById('tempSlider').value);
    const num_predict = parseInt(document.getElementById('tokenSlider').value);

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    isStreaming = true;

    // Add user message
    messages.push({ role: 'user', content: text });
    addMessage('user', text);
    addTyping();

    try {
      const res = await fetch(`${OLLAMA_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          messages: messages,
          stream: true,
          options: { temperature, num_predict }
        })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }

      removeTyping();

      let fullResponse = '';
      const bubble = addMessage('ai', '');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const lines = decoder.decode(value).split('\n').filter(Boolean);
        for (const line of lines) {
          try {
            const json = JSON.parse(line);
            if (json.message?.content) {
              fullResponse += json.message.content;
              // Simple formatting
              bubble.innerHTML = formatText(fullResponse);
              document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
          } catch {}
        }
      }

      messages.push({ role: 'assistant', content: fullResponse });

    } catch (err) {
      removeTyping();
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        showToast('⚠️ Ollama에 연결할 수 없어요.\n터미널에서 ollama serve 명령어를 실행해주세요.');
      } else {
        showToast('오류: ' + err.message);
      }
    } finally {
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('messageInput').focus();
    }
  }

  function formatText(text) {
    // Basic markdown-like formatting
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  // Init
  checkOllama();
  setInterval(checkOllama, 15000);
  document.getElementById('messageInput').focus();
</script>
</body>
</html>
